# AI Systems Manager - Docker Compose Configuration
# Bulletproof deployment for minicloud server

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-systems-manager
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
      - MINICLOUD_IP=${MINICLOUD_IP:-127.0.0.1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-daniel}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REQUIRE_HTTPS=${REQUIRE_HTTPS:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    ports:
      - "5001:5001"
    volumes:
      - data:/app/data
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests,os; requests.get(f'http://localhost:{os.getenv(\"DASHBOARD_PORT\",\"5001\")}')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
  logs:
